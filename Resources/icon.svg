<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="squircle">
      <rect x="0" y="0" width="1024" height="1024" rx="236" ry="236"/>
    </clipPath>
    <radialGradient id="bg" cx="28%" cy="16%" r="130%">
      <stop offset="0" stop-color="#23272d"/>
      <stop offset="0.60" stop-color="#0d0f12"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#C4F042" stop-opacity="0.18"/>
      <stop offset="0.60" stop-color="#C4F042" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="head" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0" stop-color="#A9E22A"/>
      <stop offset="1" stop-color="#DCFF63"/>
    </linearGradient>
    <filter id="headGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g clip-path="url(#squircle)">
    <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>
    <circle cx="614" cy="512" r="590" fill="url(#glow)"/>
    <g transform="translate(138,138) scale(3.4)">
      <g filter="url(#headGlow)">
        <path d="M40 86 l24 0 l-7 48 l-24 0 Z" fill="#DCFF63" opacity="0.18"/>
        <path d="M74 80 l26 0 l-9 60 l-26 0 Z" fill="#DCFF63" opacity="0.42"/>
        <path d="M112 73 C150 86 168 102 178 110 C168 118 150 134 112 147 Z" fill="url(#head)"/>
      </g>
    </g>
  </g>
</svg>
